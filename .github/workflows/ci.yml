name: Backend CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Cache Rust dependencies and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-targets: true
          cache-on-failure: true

      - name: Cache Solana CLI
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: solana-cli-stable-${{ runner.os }}

      - name: Install Solana CLI
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          if ! command -v solana >/dev/null 2>&1; then
            sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          solana --version
          cargo build-sbf --version

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.avm
            ~/.cargo/bin/avm
            ~/.cargo/registry
            ~/.cargo/git
          key: anchor-cli-0.32.1-${{ runner.os }}

      - name: Install Anchor CLI
        run: |
          if ! command -v avm >/dev/null 2>&1; then
            cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          fi
          if ! test -x "$HOME/.avm/bin/anchor-0.32.1"; then
            avm install 0.32.1
          fi
          avm use 0.32.1
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (Rust fmt)
        run: cargo fmt --check

      - name: Lint (Rust clippy)
        run: cargo clippy -- -D warnings

      - name: Lint (JS/TS prettier)
        run: yarn lint

      - name: Build program
        run: yarn build

      - name: Create local test wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase --silent -o "$HOME/.config/solana/id.json"

      - name: Run tests
        run: yarn test:skip-build
